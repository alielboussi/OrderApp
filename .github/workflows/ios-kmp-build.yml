name: iOS KMP Build

on:
  push:
    paths:
      - "Beverages Storeroom App IOS/**"
      - ".github/workflows/ios-kmp-build.yml"
  pull_request:
    paths:
      - "Beverages Storeroom App IOS/**"
      - ".github/workflows/ios-kmp-build.yml"

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Build shared framework
        working-directory: "Beverages Storeroom App IOS"
        run: ./gradlew :shared:podspec

      - name: Install pods
        working-directory: "Beverages Storeroom App IOS/iosApp"
        run: pod install

      - name: Build iOS app (requires Xcode project)
        working-directory: "Beverages Storeroom App IOS/iosApp"
        run: |
          if ls *.xcodeproj 1> /dev/null 2>&1; then
            xcodebuild -scheme BeveragesStoreroomAppIOS -sdk iphonesimulator -configuration Debug build
          else
            echo "No Xcode project found. Create one in iosApp/ on a Mac, then re-run."
          fi
